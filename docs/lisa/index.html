<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Lisa Tasks" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Lisa's Tasks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      padding: 36px 32px;
      width: 100%;
      max-width: 480px;
    }

    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 24px; font-weight: 700; color: #5b21b6; margin-bottom: 4px; }
    .header p { font-size: 14px; color: #9ca3af; }
    .heart { display: inline-block; color: #8b5cf6; font-size: 20px; }

    label {
      display: block; font-size: 13px; font-weight: 600; color: #6b7280;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .field { margin-bottom: 18px; }

    input[type="text"], input[type="date"], input[type="time"],
    textarea, select {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e5e7eb; border-radius: 12px;
      font-size: 16px; font-family: inherit; color: #1f2937;
      background: #fafafa; transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      outline: none; border-color: #8b5cf6; background: white;
    }

    textarea { resize: none; height: 80px; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    button[type="submit"] {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white; font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 4px;
    }

    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Dashboard styles */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .dash-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: #5b21b6;
    }

    .refresh-btn {
      padding: 6px 14px; border: 2px solid #e5e7eb; border-radius: 10px;
      background: white; color: #6b7280; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: all 0.15s;
    }

    .refresh-btn:hover { border-color: #8b5cf6; color: #7c3aed; }

    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px;
      background: #fafafa;
      border-radius: 14px;
      border-left: 4px solid #e5e7eb;
    }

    .task-item.status-pending  { border-left-color: #f59e0b; }
    .task-item.status-open     { border-left-color: #8b5cf6; }
    .task-item.status-printed  { border-left-color: #6366f1; }
    .task-item.status-archived { border-left-color: #10b981; }
    .task-item.overdue         { background: #fef2f2; }

    .task-content { flex: 1; min-width: 0; }

    .task-title {
      font-size: 15px; font-weight: 600; color: #1f2937;
      margin-bottom: 4px; word-break: break-word;
    }

    .task-title.done { text-decoration: line-through; color: #9ca3af; }

    .task-meta {
      font-size: 12px; color: #9ca3af;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pill-pending  { background: #fef3c7; color: #92400e; }
    .pill-received { background: #ede9fe; color: #5b21b6; }
    .pill-printed  { background: #e0e7ff; color: #3730a3; }
    .pill-done     { background: #d1fae5; color: #065f46; }
    .pill-overdue  { background: #fee2e2; color: #991b1b; }

    .pill-high { background: #fee2e2; color: #991b1b; }
    .pill-med  { background: #fef3c7; color: #92400e; }
    .pill-low  { background: #f3f4f6; color: #6b7280; }

    .empty-state {
      text-align: center; padding: 32px 16px; color: #9ca3af; font-size: 14px;
    }

    .task-note {
      font-size: 12px; color: #6b7280; margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .toast {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #059669; color: white; padding: 14px 24px;
      border-radius: 12px; font-size: 15px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease; z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <!-- Add Task Form -->
  <div class="card">
    <div class="header">
      <h1><span class="heart">&#10084;</span> Lisa's Tasks</h1>
      <p>Add something to David's to-do list</p>
    </div>

    <form id="task-form">
      <div class="field">
        <label for="title">What needs to be done?</label>
        <input type="text" id="title" placeholder="e.g. Pick up milk" required autofocus />
      </div>

      <div class="row">
        <div class="field">
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="1">High</option>
            <option value="2" selected>Medium</option>
            <option value="3">Low</option>
          </select>
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="personal" selected>Personal</option>
            <option value="work">Work</option>
            <option value="school">School</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="due_date">Due date (optional)</label>
          <input type="date" id="due_date" />
        </div>
        <div class="field">
          <label for="due_time">Time (optional)</label>
          <input type="time" id="due_time" />
        </div>
      </div>

      <div class="field">
        <label for="notes">Note (optional)</label>
        <textarea id="notes" placeholder="Any extra details..."></textarea>
      </div>

      <button type="submit" id="submit-btn">Send to David</button>
    </form>
  </div>

  <!-- Task Dashboard -->
  <div class="card">
    <div class="dash-header">
      <h2>My Tasks</h2>
      <button class="refresh-btn" id="refresh-btn" onclick="loadTasks()">Refresh</button>
    </div>
    <div id="task-list" class="task-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <div class="toast" id="toast">Task added!</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ypxoaeckjvveoodsjzdj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ODeoDNk6_4fNKK9EFysyXw_MXilpb06';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('task-form');
    const toast = document.getElementById('toast');
    const submitBtn = document.getElementById('submit-btn');
    const taskListEl = document.getElementById('task-list');

    // Submit form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      const title = document.getElementById('title').value.trim();
      const priority = parseInt(document.getElementById('priority').value);
      const category = document.getElementById('category').value;
      const dueDate = document.getElementById('due_date').value || null;
      const dueTime = document.getElementById('due_time').value || null;
      const notes = document.getElementById('notes').value.trim() || null;

      try {
        const { error } = await sb.from('remote_tasks').insert({
          title, priority, category, source: 'lisa',
          due_date: dueDate, due_time: dueTime, notes,
          quick_print: true,
        });
        if (error) throw error;
        form.reset();
        showToast('Task sent to David!');
        loadTasks();
      } catch (err) {
        console.error(err);
        showToast('Something went wrong. Try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send to David';
      }
    });

    // Load and render tasks
    async function loadTasks() {
      try {
        const { data, error } = await sb
          .from('remote_tasks')
          .select('*')
          .eq('source', 'lisa')
          .order('created_at', { ascending: false })
          .limit(25);

        if (error) throw error;
        renderTasks(data || []);
      } catch (err) {
        console.error(err);
        taskListEl.innerHTML = '<div class="empty-state">Could not load tasks</div>';
      }
    }

    function renderTasks(tasks) {
      if (tasks.length === 0) {
        taskListEl.innerHTML = '<div class="empty-state">No tasks yet. Add one above!</div>';
        return;
      }

      const today = new Date().toISOString().split('T')[0];

      taskListEl.innerHTML = tasks.map(task => {
        const status = getStatus(task);
        const isOverdue = task.due_date && task.due_date < today && status.key !== 'archived';
        const isDone = status.key === 'archived';
        const priLabels = { 1: 'High', 2: 'Med', 3: 'Low' };
        const priClasses = { 1: 'pill-high', 2: 'pill-med', 3: 'pill-low' };

        return `
          <div class="task-item status-${status.key} ${isOverdue ? 'overdue' : ''}">
            <div class="task-content">
              <div class="task-title ${isDone ? 'done' : ''}">${esc(task.title)}</div>
              <div class="task-meta">
                <span class="pill ${status.pillClass}">${status.label}</span>
                <span class="pill ${priClasses[task.priority] || 'pill-med'}">${priLabels[task.priority] || 'Med'}</span>
                ${isOverdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
                ${task.due_date ? `<span>${task.due_date}${task.due_time ? ' ' + task.due_time : ''}</span>` : ''}
              </div>
              ${task.notes ? `<div class="task-note">${esc(task.notes)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function getStatus(task) {
      if (task.local_status === 'archived') {
        return { key: 'archived', label: 'Done', pillClass: 'pill-done' };
      }
      if (task.printed_at) {
        return { key: 'printed', label: 'Printed', pillClass: 'pill-printed' };
      }
      if (task.synced) {
        return { key: 'open', label: 'Received', pillClass: 'pill-received' };
      }
      return { key: 'pending', label: 'Pending', pillClass: 'pill-pending' };
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Load on page load
    loadTasks();

    // Register service worker for PWA install
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
